# Render Blueprint — Orion Alpha production
# https://render.com/docs/blueprint-spec
#
# Deploy: push to GitHub, then open:
# https://dashboard.render.com/blueprint/new?repo=https://github.com/jenish2214/HFT_
services:
  - type: web
    name: orion-alpha-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: HFT_DEMO
        value: "1"
      - key: HFT_SYMBOL
        value: AAPL
      - key: HFT_ENGINE_HOST
        value: 127.0.0.1
      - key: HFT_ENGINE_PORT
        value: "9001"

  - type: web
    name: orion-alpha-dashboard
    runtime: node
    rootDir: frontend
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Server-side /api proxy → internal API (Render private network)
      - key: API_URL
        fromService:
          type: web
          name: orion-alpha-api
          property: hostport
