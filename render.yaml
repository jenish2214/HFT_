# Render Blueprint — Orion Alpha production (2 services)
# API: Docker (C++ engine + Python FastAPI + quant research) · Dashboard: Next.js
#
# Deploy checklist:
#   1. git push origin main
#   2. Open Blueprint: https://dashboard.render.com/blueprint/new?repo=https://github.com/jenish2214/HFT_
#   3. Apply → wait ~10 min for Docker API, then dashboard
#   4. URLs: orion-alpha-dashboard.onrender.com · orion-alpha-api.onrender.com
#
# Free-plan note: free web services cannot RECEIVE private-network traffic.
# Dashboard → API must use the public https://…onrender.com URL (not hostport).
services:
  - type: web
    name: orion-alpha-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: HFT_DEMO
        value: "1"
      - key: HFT_SYMBOL
        value: AAPL
      - key: HFT_ENGINE_HOST
        value: 127.0.0.1
      - key: HFT_ENGINE_PORT
        value: "9001"
      - key: ALLOWED_ORIGINS
        value: https://orion-alpha-dashboard.onrender.com

  - type: web
    name: orion-alpha-dashboard
    runtime: node
    rootDir: frontend
    plan: free
    region: oregon
    # Fail fast if Root Directory is wrong (must be `frontend`, not repo root).
    # --include=dev: NODE_ENV=production would otherwise skip typescript/@types needed by next build
    buildCommand: test -f components/FullScreenChartView.tsx -a -f lib/orionAlpha.ts && npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Public URL required on free plan (private hostport is not reachable inbound)
      - key: API_URL
        value: https://orion-alpha-api.onrender.com
