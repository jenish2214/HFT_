# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hft-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: HFT_DEMO
        value: "1"
      - key: HFT_SYMBOL
        value: AAPL
      - key: HFT_ENGINE_HOST
        value: 127.0.0.1
      - key: HFT_ENGINE_PORT
        value: "9001"

  - type: web
    name: hft-dashboard
    runtime: node
    rootDir: frontend
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: hft-api
          property: host
